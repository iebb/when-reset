name: WhenReset
options:
  bundleIdPrefix: ad.neko
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 7P8CLHDH5G
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 5
targets:
  WhenReset:
    type: application
    platform: iOS
    sources:
      - path: WhenReset
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ad.neko.when
        INFOPLIST_FILE: WhenReset/Info.plist
        CODE_SIGN_ENTITLEMENTS: WhenReset/WhenReset.entitlements
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: When Reset App Store
    dependencies:
      - target: WhenResetWidgets
    scheme:
      testTargets:
        - WhenResetTests
  WhenResetWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: WhenResetWidgets
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ad.neko.when.widgets
        INFOPLIST_FILE: WhenResetWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: WhenResetWidgets/WhenResetWidgets.entitlements
        SKIP_INSTALL: YES
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: When Reset Widgets App Store
  WhenResetTests:
    type: bundle.unit-test
    platform: iOS
    sources: [WhenResetTests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: WhenReset
